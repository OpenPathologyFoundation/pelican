name: CI

on:
  pull_request:

jobs:
  digital-viewer:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: digital-viewer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: digital-viewer/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm test

  tile-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -e .
          pip install -e "utilities/server[test]"
      - name: Run tests
        working-directory: utilities/server
        run: pytest tests/
